{% extends "base.html" %}

{% block extra_css %}
<style>
    /* Full screen viewer without topbar or sidebar */
    body { margin: 0; overflow: hidden; background: #000; }
    .sidebar { display: none !important; }
    .top-bar { display: none !important; }
    main { padding: 0 !important; margin: 0 !important; width: 100vw; height: 100vh; max-width: 100vw; }
    .app-layout { padding: 0 !important; }

    #pdfViewerContainer {
        width: 100vw;
        height: 100vh;
        overflow-y: auto;
        background: #323639;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px 0;
    }
    
    .pdf-page-canvas {
        margin-bottom: 20px;
        box-shadow: 0 5px 25px rgba(0,0,0,0.5);
        max-width: 95vw;
    }

    #backBtn {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 100;
        background: rgba(0,0,0,0.6);
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        backdrop-filter: blur(10px);
    }
    #backBtn:hover { background: rgba(0,0,0,0.8); }

    /* Password Prompt Overlay */
    #passwordOverlay {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.8);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        backdrop-filter: blur(10px);
    }
    .password-card {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        padding: 30px;
        border-radius: var(--radius-lg);
        text-align: center;
        width: 90%;
        max-width: 400px;
        box-shadow: var(--shadow-xl);
    }
    .password-card h3 { margin-top: 0; color: white; margin-bottom: 20px; }
    .password-card input {
        width: 100%;
        padding: 12px;
        margin-bottom: 20px;
        border-radius: 8px;
        border: 1px solid var(--border-color);
        background: var(--bg-input);
        color: white;
        font-size: 16px;
    }
    .password-card button {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        background: var(--accent-primary);
        color: white;
        border: none;
        font-weight: bold;
        font-size: 16px;
        cursor: pointer;
    }
    .password-card button:hover { background: var(--accent-secondary); }
</style>
<!-- Include PDF.js from CDN -->
<script src="/static/js/pdf.min.js"></script>
<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = '/static/js/pdf.worker.min.js';
</script>
{% endblock %}

{% block content %}
<button id="backBtn" onclick="window.history.back()" tabindex="0"><i class="fas fa-arrow-left"></i> Exit Cast</button>

<!-- Password Prompt Overlay -->
<div id="passwordOverlay">
    <div class="password-card">
        <h3><i class="fas fa-lock" style="color: var(--warning); margin-right: 10px;"></i>Password Protected</h3>
        <p style="color: var(--text-secondary); margin-bottom: 20px;">Please enter the password to unlock this PDF.</p>
        <input type="password" id="pdfPasswordInput" placeholder="Password" tabindex="0">
        <button id="pdfPasswordSubmit" tabindex="0">Unlock PDF</button>
    </div>
</div>

<!-- Floating Scroll Controls for TV Pointer Mode -->
<div id="tvScrollControls" style="position: fixed; right: 30px; bottom: 30px; display: flex; flex-direction: column; gap: 20px; z-index: 9999;">
    <button onclick="scrollPdf(-window.innerHeight * 0.6)" style="width: 80px; height: 80px; border-radius: 40px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); color: white; font-size: 30px; backdrop-filter: blur(10px); cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; transition: all 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.3)'" onmouseout="this.style.background='rgba(255,255,255,0.1)'">
        <i class="fas fa-chevron-up"></i>
    </button>
    <button onclick="scrollPdf(window.innerHeight * 0.6)" style="width: 80px; height: 80px; border-radius: 40px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); color: white; font-size: 30px; backdrop-filter: blur(10px); cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; transition: all 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.3)'" onmouseout="this.style.background='rgba(255,255,255,0.1)'">
        <i class="fas fa-chevron-down"></i>
    </button>
</div>

<div id="pdfViewerContainer"></div>

<script>
async function renderPremiumPdf(url, pwd) {
    const container = document.getElementById('pdfViewerContainer');
    const passwordOverlay = document.getElementById('passwordOverlay');
    const passwordInput = document.getElementById('pdfPasswordInput');
    const passwordSubmit = document.getElementById('pdfPasswordSubmit');

    container.innerHTML = '<div style="color: white; margin-top: 50px;">Loading Magic Cast...</div>';
    
    try {
        const docConfig = { url: url };
        if (pwd) docConfig.password = pwd;
        
        const loadingTask = pdfjsLib.getDocument(docConfig);
        
        // Handle Password Protection
        loadingTask.onPassword = function(updatePassword, reason) {
            passwordOverlay.style.display = 'flex';
            passwordInput.focus();
            
            // Allow retry if wrong password
            if (reason === pdfjsLib.PasswordResponses.INCORRECT_PASSWORD) {
                passwordInput.value = '';
                passwordInput.style.borderColor = 'red';
            }

            passwordSubmit.onclick = () => {
                const pwd = passwordInput.value;
                if (pwd) {
                    passwordOverlay.style.display = 'none';
                    updatePassword(pwd);
                }
            };
        };

        const pdf = await loadingTask.promise;
        container.innerHTML = '';

        // --- High-Performance TV-Optimized PDF Renderer ---
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const canvas = entry.target;
                    if (!canvas.dataset.rendered && !canvas.dataset.rendering) {
                        canvas.dataset.rendering = 'true';
                        const pageNum = parseInt(canvas.dataset.page);
                        
                        const ctx = canvas.getContext('2d');
                        ctx.fillStyle = '#f0f0f0';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        
                        // Queue rendering to prevent TV freezing
                        setTimeout(() => {
                            pdf.getPage(pageNum).then(page => {
                                // TVs have weak GPUs. Use 1.0 scale for TV, 1.5 for desktop.
                                const isTV = document.body.classList.contains('tv-mode');
                                const scale = isTV ? 1.0 : 1.5;
                                const viewport = page.getViewport({scale: scale});
                                
                                canvas.height = viewport.height;
                                canvas.width = viewport.width;
                                
                                page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport }).promise.then(() => {
                                    canvas.dataset.rendered = 'true';
                                    canvas.dataset.rendering = '';
                                });
                            });
                        }, 50); // Small delay allows UI thread to breathe
                    }
                }
            });
        }, { root: container, rootMargin: '200px' });
        
        for(let i = 1; i <= pdf.numPages; i++) {
            const canvas = document.createElement('canvas');
            canvas.dataset.page = i;
            
            // Responsive CSS styling
            canvas.style.width = '100%';
            canvas.style.maxWidth = '1000px';
            canvas.style.height = 'auto';
            canvas.style.aspectRatio = '1 / 1.414'; // Standard A4 placeholder
            canvas.style.marginBottom = '30px';
            canvas.style.backgroundColor = 'white';
            canvas.style.boxShadow = '0 10px 30px rgba(0,0,0,0.5)';
            canvas.style.borderRadius = '4px';
            
            container.appendChild(canvas);
            observer.observe(canvas);
        }

    } catch(err) {
        console.error('Error rendering PDF:', err);
        container.innerHTML = `<div style="color: white; margin-top: 50px;">Error rendering document. It might not be a valid PDF.</div>`;
    }
}

// TV Remote Scrolling Support
function scrollPdf(amount) {
    const container = document.getElementById('pdfViewerContainer');
    try {
        if (typeof container.scrollBy === 'function') {
            container.scrollBy({ top: amount, behavior: 'smooth' });
        } else {
            container.scrollTop += amount;
        }
    } catch(e) {
        // Fallback for older browsers that don't support options object in scrollBy
        container.scrollTop += amount;
    }
}

document.addEventListener('keydown', function(e) {
    // If they are typing in the password box, let them type
    if (document.activeElement.tagName === 'INPUT') return;
    
    const scrollAmount = window.innerHeight * 0.4; // Scroll 40% of the screen height per click
    
    switch(e.key) {
        case 'ArrowDown':
            e.preventDefault();
            scrollPdf(scrollAmount);
            break;
        case 'ArrowUp':
            e.preventDefault();
            scrollPdf(-scrollAmount);
            break;
        case 'ArrowRight':
        case 'Enter':
        case ' ':
            e.preventDefault();
            scrollPdf(window.innerHeight * 0.8); // Page down
            break;
        case 'ArrowLeft':
        case 'Backspace':
            e.preventDefault();
            scrollPdf(-window.innerHeight * 0.8); // Page up
            break;
    }
});

document.addEventListener('DOMContentLoaded', () => {
    const url = "{{ url|safe }}";
    
    // Check if it's an image
    if (url.match(/\.(jpeg|jpg|gif|png|webp)$/i)) {
        const container = document.getElementById('pdfViewerContainer');
        container.innerHTML = `<img src="${url}" style="max-width: 95vw; max-height: 95vh; object-fit: contain; margin: auto;">`;
    } else {
        // Assume PDF
        const urlParams = new URLSearchParams(window.location.search);
        const pwd = urlParams.get('pwd');
        renderPremiumPdf(url, pwd);
    }
});
</script>
{% endblock %}
